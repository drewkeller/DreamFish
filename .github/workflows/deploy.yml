name: Package and Release Addon

on:
  push:
    tags:
      - '**'
  workflow_dispatch: # Allows manual triggering of the workflow on GitHub Actions page

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Package and Ship
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
